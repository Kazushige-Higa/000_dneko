name: Deploy to Lolipop via FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ftp-deploy:
    name: Deploy to Lolipop
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          protocol: ftps
          port: 21
          security: loose
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.DS_Store
            **/.vscode/**
            **/.idea/**
            **/node_modules/**
            **/.env
            **/.env.*
            **/data/pv.json
            **/data/likes.json
            **/data/ga4/service_account.json
            **/data/ga4/token.json
            **/data/ga4/cache.json
            **/README.md
            **/ga4_dashboard_README.md
            **/*.map
            **/scss/**
            **/*.scss
